<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width", initial-scale="1.0">
    <title>LinkNPlay | Multiplayer Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300"; 400; 600; 800&display="swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-effects">
        <div class="glow-blob blob-1"></div>
        <div class="glow-blob blob-2"></div>
    </div>

    <header class="navbar">
        <div class="logo">
            <span class="gradient-text">Link</span><span class="white-text">N</span><span class="gradient-text">Play</span>
        </div>

        <div class="user-profile">
            <div class="avatar">👤</div>
            <div class="user-info">
                <span id="playerName">Loading...</span>
                <span class="score-badge">🏆 <span id="playerScore">0</span></span>
            </div>
        </div>
    </header>

    
</body>
</html>
