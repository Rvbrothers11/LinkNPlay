<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width", initial-scale="1.0">
    <title>LinkNPlay | Multiplayer Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300"; 400; 600; 800&display="swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-effects">
        <div class="glow-blob blob-1"></div>
        <div class="glow-blob blob-2"></div>
    </div>

    <header class="navbar">
        <div class="logo">
            <span class="gradient-text">Link</span><span class="white-text">N</span><span class="gradient-text">Play</span>
        </div>

        <div class="user-profile">
            <div class="avatar">👤</div>
            <div class="user-info">
                <span id="playerName">Loading...</span>
                <span class="score-badge">🏆 <span id="playerScore">0</span></span>
            </div>
        </div>
    </header>

    <main class="container">
        <section id="lobby" class="glass-panel">
            <div class="panel-header">
                <h2>Start Playing</h2>
                <p>Create a room or join a friend to begin your match.</p>
            </div>
            <div class="action-cards">
                <div class="action-card host-card">
                    <h3>Host Match</h3>
                    <p class="card-desc">Generate a code and invite a friend.</p>
                    <button class="btn btn-primary" onClick="createRoom()">Generate Room Code</button>
                </div>

                <div class="divider">
                    <span>VS</span>
                </div>

                <div class="action-card" join-card>
                    <h3>Join Match</h3>
                    <p class="card-desc">Enter your friend's 4-letter room code.</p>
                    <div class="input-group">
                        <input type="text" id="roomCodeInput" placeholder="CODE" maxlength="4">
                        <button class="btn btn-secondary" onClick="joinRoom()">Connect</button>
                    </div>
                </div>
            </div>
        </section>
        
    </main>

</body>
</html>
